id: US-15-RESET-PASSWORD
role: all
feature: Reset password using a token from the forgot-password email
page: 15-reset-password.html
goal: |
  A visitor who received a password reset link enters a new password (min 8 chars)
  and confirms it to reset their account password.

acceptance_criteria:
  - id: AC-1
    description: Enter a valid reset token (from URL) and new password (min 8 chars) with confirmation, then submit
    ui_route: /reset-password?token=...
    endpoint: POST /api/auth/reset-password
    expected: "200 OK, success state overlay appears, 'Password Reset Successful' with Sign In link"
  - id: AC-2
    description: Toggle password visibility on new password and confirm password fields
    ui_route: /reset-password
    endpoint: none
    expected: "Clicking eye icon toggles between password and text input type"
  - id: AC-3
    description: Click "Sign In" link in footer or success state to navigate to login page
    ui_route: /reset-password
    endpoint: none
    expected: "Navigate to /02-login.html"

boundary_cases:
  - case: "Password strength indicator shows 2/4 bars for 'password' (no uppercase, no digit, no special) — partial strength"
  - case: "Password fewer than 8 characters — client-side validation prevents submission, server returns 400 if bypassed"
  - case: "Passwords do not match — form validation prevents submission"
  - case: "Token missing from URL — form may still render; server returns 400 'token is required' on submit"

error_scenarios:
  - scenario: "Invalid or expired token — server returns 400 or 404 with message 'Invalid or expired reset token'"
  - scenario: "Token already used — server returns 400 'Token has already been used'"
  - scenario: "Network failure — submit button re-enabled, inline error message"

state_transitions:
  - state: loading
    expected: "Reset Password button shows spinner and is disabled"
  - state: success
    expected: "Success overlay replaces form: green checkmark icon, 'Password Reset Successful' heading, Sign In button"
  - state: error
    expected: "Inline error text below form or form-level error banner"

fixture_refs:
  - users.renter
