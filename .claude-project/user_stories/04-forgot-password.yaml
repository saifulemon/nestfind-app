id: US-04-FORGOT-PASSWORD
role: all
feature: Request password reset email
page: 04-forgot-password.html
goal: |
  A visitor who has forgotten their password enters their email address to
  receive a password reset link.

acceptance_criteria:
  - id: AC-1
    description: Enter a registered email and submit to request a password reset link
    ui_route: /forgot-password
    endpoint: POST /api/auth/forgot-password
    expected: "200 OK, generic success message: 'If an account with that email exists, a password reset link has been sent'"
  - id: AC-2
    description: Click "Back to login" link to return to the login page
    ui_route: /forgot-password
    endpoint: none
    expected: "Navigate to /02-login.html"

boundary_cases:
  - case: "Email field empty — form validation prevents submission via browser required attribute"
  - case: "Enter email not registered — server still returns 200 with generic message (prevents user enumeration)"
  - case: "Email at max valid length — accepted; malformed email — 400 validation error"

error_scenarios:
  - scenario: "Invalid email format (e.g. 'notanemail') — server returns 400, field-level error shown"
  - scenario: "Network failure — timeout, user sees connection error message"

state_transitions:
  - state: loading
    expected: "Send Reset Link button shows spinner and is disabled"
  - state: success
    expected: "Generic success message displayed (no redirect, user stays on page with confirmation text)"

fixture_refs:
  - users.renter
