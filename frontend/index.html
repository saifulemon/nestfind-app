<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestFind - Find Your Perfect Home | Property Rental Platform</title>
    <meta name="description" content="NestFind is the easiest way to discover and rent properties. Browse apartments, houses, and commercial spaces. Save favorites, schedule tours, and apply online." />
    <meta name="keywords" content="rental properties, apartments for rent, house rental, property listing, real estate, NestFind, find home, rent home" />
    <meta name="author" content="NestFind" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4A90D9" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nestfind.vercel.app" />
    <meta property="og:title" content="NestFind - Find Your Perfect Home" />
    <meta property="og:description" content="Discover and rent properties easily. Browse apartments, houses, and commercial spaces with NestFind." />
    <meta property="og:image" content="https://nestfind.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nestfind.vercel.app" />
    <meta property="twitter:title" content="NestFind - Find Your Perfect Home" />
    <meta property="twitter:description" content="Discover and rent properties easily. Browse apartments, houses, and commercial spaces with NestFind." />
    <meta property="twitter:image" content="https://nestfind.vercel.app/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://nestfind.vercel.app" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "NestFind",
        "url": "https://nestfind.vercel.app",
        "description": "Find your perfect home. Browse rental properties, apartments, and houses.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://nestfind.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NestFind",
        "url": "https://nestfind.vercel.app",
        "logo": "https://nestfind.vercel.app/logo.png",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/entry.client.tsx"></script>
  </body>
</html>
