# Render Blueprint for NestFind
# One-click deploy: push to GitHub, connect repo on dashboard.render.com, select "Blueprint"
# Frontend deploys separately to Vercel — see frontend/vercel.json

services:
  - type: web
    name: nestfind-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: nestfind-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: AUTH_TOKEN_COOKIE_NAME
        value: access_token
      - key: AUTH_REFRESH_COOKIE_NAME
        value: refresh_token
      - key: APP_URL
        value: https://nestfind-api.onrender.com
      - key: API_URL
        value: https://nestfind-api.onrender.com/api
      - key: FRONTEND_URL
        sync: false
        value: https://YOUR_VERCEL_APP.vercel.app

databases:
  - name: nestfind-db
    plan: free
    region: singapore
    databaseName: nestfind
    user: nestfind
